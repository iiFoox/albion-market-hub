  - id: "practical_first_project_walkthrough"
    config_marker: "practical_first_project_walkthrough:"
    checker: ".agents/tools/check-first-project-walkthrough.ps1"
    protocol: ".agents/protocols/practical-first-project-walkthrough-protocol.md"
