    files:
      - ".agents/protocols/operator-runbook-recovery-protocol.md"
      - ".agents/tools/check-operator-runbook.ps1"
      - ".agents/docs/en/29-OPERATOR-RUNBOOK-RECOVERY.md"
      - ".agents/docs/en/24-UNIFIED-OPERATOR-CLI.md"
      - ".agents/docs/en/20-INSTALL-UPDATE-WIZARD.md"
      - ".agents/releases/PACKAGE-CHECKLIST.md"

  guided-installer:
    trigger: "Guided install, repository mode, GitHub/local repository onboarding, first-call handoff, or START-HEPHAESTUS launcher."
    files:
      - ".agents/protocols/guided-installer-repository-onboarding-protocol.md"
      - ".agents/tools/install-hephaestus-launcher.ps1"
      - ".agents/tools/install-hephaestus.bat"
      - ".agents/tools/check-guided-installer.ps1"
      - ".agents/docs/en/30-GUIDED-INSTALLER-REPOSITORY-ONBOARDING.md"
      - ".agents/docs/en/29-OPERATOR-RUNBOOK-RECOVERY.md"
      - ".agents/docs/en/20-INSTALL-UPDATE-WIZARD.md"

  first-project-walkthrough:
    trigger: "First project, how to start, new project walkthrough, existing project onboarding, first real use, or operator uncertainty after install."
    files:
      - ".agents/protocols/practical-first-project-walkthrough-protocol.md"
      - ".agents/tools/check-first-project-walkthrough.ps1"
      - ".agents/docs/en/31-PRACTICAL-FIRST-PROJECT-WALKTHROUGH.md"
      - ".agents/docs/en/30-GUIDED-INSTALLER-REPOSITORY-ONBOARDING.md"
      - ".agents/docs/en/27-PROJECT-BOOTSTRAP-ASSISTANT.md"
      - ".agents/docs/en/12-PROJECT-DISCOVERY.md"
      - ".agents/docs/en/13-REAL-PROJECT-ADAPTER.md"

  database:
    trigger: "Database schema, migration, persistence, query, cache, or data modeling work."
    files:
      - ".agents/knowledge/database-playbook/database-playbook.md"

  api:
    trigger: "API design, REST, integration, service boundary, or external contract work."
    files:
      - ".agents/agents/builder/patterns/api-design/rest-best-practices.md"
      - ".agents/knowledge/security/api-security/api-security.md"

  resilience:
    trigger: "Reliability, retry, timeout, circuit breaker, outage, or incident work."
    files:
      - ".agents/agents/builder/patterns/error-handling/retry-circuit-breaker.md"
      - ".agents/agents/builder/patterns/error-handling/global-error-handler.md"
      - ".agents/knowledge/resilience/resilience-patterns.md"

rules:
  - "Always load core first."
  - "Escalation loads only delta files for the higher tier."
  - "Conditional groups are loaded only when the trigger is relevant."
  - "Do not load broad technology catalogs by default."
  - "Use the estimator before expanding tier definitions."
